# Docker Compose - Testes
# Uso: docker-compose -f docker-compose.yml -f docker-compose.test.yml up

services:
  # Banco de dados isolado para testes
  db:
    environment:
      POSTGRES_DB: chatbot_rag_test
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  # Backend com configuração de teste
  backend:
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-chatbot}:${POSTGRES_PASSWORD:-chatbot123}@db:5432/chatbot_rag_test
      TESTING: "true"
    command: ["pytest", "-v", "--tb=short"]
    ports:
      - "8001:8000"

  # Frontend com testes
  frontend:
    command: ["npm", "run", "test"]
    ports:
      - "5174:5173"

volumes:
  postgres_test_data:
