# Docker Compose - Produção
# Uso: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # Banco de dados com configurações de produção
  db:
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-chatbot_rag}
    # Sem exposição de porta externa em produção
    ports: []

  # Backend com uvicorn otimizado para produção
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-chatbot_rag}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
    # Remove volume mount em produção (usa código do build)
    volumes: []
    # Uvicorn otimizado para produção (sem reload, múltiplos workers)
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
    # Sem exposição direta, apenas via frontend/nginx
    ports: []
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G

  # Frontend com nginx para produção
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    volumes: []
    ports:
      - "80:80"
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
